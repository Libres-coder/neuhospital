# Docker Compose for the Neusoft Hospital full stack.
#
# Brings up:
#   - mysql      : MySQL 8 with a persistent volume and a one-shot init script
#                  that creates the database + grants the app user.
#   - hospital   : The Spring Boot backend, layered-jar runtime image, exposed
#                  on host port 8090. Waits for MySQL to become healthy first
#                  so Flyway migrations never race the database.
#
# Usage:
#   docker compose up -d --build
#   docker compose logs -f hospital
#   docker compose down                  # stop
#   docker compose down -v               # stop + delete MySQL volume (data loss)
#
# Override anything via env vars or a `.env` file at this directory.

name: neusoft-hospital

services:
  mysql:
    image: mysql:8.0.36
    container_name: neusoft-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-neusoft_hospital}
      MYSQL_USER: ${MYSQL_USER:-hospital}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-hospital_pass}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
      - --max_connections=200
      - --innodb-buffer-pool-size=256M
    ports:
      - "${MYSQL_HOST_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./server/scripts/mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - "CMD"
        - "mysqladmin"
        - "ping"
        - "-h"
        - "127.0.0.1"
        - "-u"
        - "root"
        - "-p${MYSQL_ROOT_PASSWORD:-123456}"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hospital-net

  hospital:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: neusoft/hospital-server:0.0.1
    container_name: neusoft-hospital
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      # connect to the in-network MySQL service, not localhost
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_NAME: ${MYSQL_DATABASE:-neusoft_hospital}
      DB_USER: ${MYSQL_USER:-hospital}
      DB_PASSWORD: ${MYSQL_PASSWORD:-hospital_pass}
      # JWT — override in production
      JWT_SECRET: ${JWT_SECRET:-neusoft-hospital-dev-secret-key-please-rotate-in-production}
      # SMS gateway (dev: fixed-code mode)
      SMS_FIXED_CODE: ${SMS_FIXED_CODE:-123456}
      # CORS — comma-separated origins or "*"
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-*}
      CORS_ALLOW_CREDENTIALS: ${CORS_ALLOW_CREDENTIALS:-false}
      SERVER_PORT: "8090"
      TZ: Asia/Shanghai
    ports:
      - "${HOSPITAL_HOST_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8090/actuator/health/liveness || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    networks:
      - hospital-net

volumes:
  mysql_data:
    name: neusoft_mysql_data

networks:
  hospital-net:
    name: neusoft-hospital-net
    driver: bridge