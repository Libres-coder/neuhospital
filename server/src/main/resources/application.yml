server:
  port: 8090
  servlet:
    context-path: /
  error:
    include-message: never
    include-stacktrace: never

spring:
  application:
    name: hospital-server
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 12MB
  datasource:
    # In Docker compose, DB_HOST points at the `mysql` service.
    # In local dev (running the jar directly), default to 127.0.0.1.
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:neusoft_hospital}?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false

# Actuator: only health + info exposed. Everything else is denied by SecurityConfig.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: false
    java:
      enabled: true
    os:
      enabled: true
    build:
      enabled: true
    app:
      name: ${spring.application.name}
      version: @project.version@
      description: Neusoft Hospital Android backend
      encoding: UTF-8

# JWT — secret MUST be provided via env in production.
# Override at startup: JWT_SECRET=... java -jar app.jar
# Two-tier token: short-lived access (15 min) + long-lived refresh (7 days), refresh is
# single-use (server tracks the rotation by `jti`).
app:
  upload:
    # Local directory for triage photo uploads. Served at /uploads/**.
    dir: ${UPLOAD_DIR:uploads}
    # Public URL prefix that the AI vision model can fetch. Set to the
    # host:port the phone/emulator can reach this server on.
    public-base-url: ${UPLOAD_PUBLIC_BASE_URL:http://localhost:8090}
    max-image-bytes: ${UPLOAD_MAX_BYTES:5242880}
  jwt:
    secret: ${JWT_SECRET:neusoft-hospital-dev-secret-key-please-rotate-in-production}
    access-ttl-seconds: 900         # 15 minutes
    refresh-ttl-seconds: 604800     # 7 days
    issuer: neusoft-hospital
  sms:
    # dev: always accept this code. Production: leave blank and plug in a real SMS gateway.
    fixed-code: ${SMS_FIXED_CODE:123456}
    ttl-seconds: 300
    # which SmsSender bean to activate. 'log' (default) just logs the payload;
    # 'aliyun' uses dysmsapi with ALIYUN_SMS_ACCESS_KEY_ID / SECRET.
    provider: ${SMS_PROVIDER:log}
  cors:
    # dev defaults to wildcard; production must list exact origins
    allowed-origins: ${CORS_ALLOWED_ORIGINS:*}
    allow-credentials: ${CORS_ALLOW_CREDENTIALS:false}
  ai:
    system-prompt: ${AI_SYSTEM_PROMPT:你是"东软医院"的智能导诊助理。请用简洁、温暖、专业的语气回答；若涉及急重症，请立即建议拨打 120。}
    # per-user AI calls
    ratelimit:
      per-user-max: 30
      window-seconds: 60
    max-content-length: 500
    bailian:
      # Alibaba Bailian (DashScope / 阿里百炼) integration.
      # Provide DASHSCOPE_API_KEY or BAILIAN_API_KEY env var. When unset, chat
      # falls back to a local keyword matcher (see BailianClient#isEnabled).
      api-key: ${DASHSCOPE_API_KEY:${BAILIAN_API_KEY:}}
      model: ${BAILIAN_MODEL:qwen-turbo}  # also qwen-plus, qwen-max
      temperature: ${BAILIAN_TEMPERATURE:0.4}
      max-tokens: ${BAILIAN_MAX_TOKENS:800}
      timeout-ms: ${BAILIAN_TIMEOUT_MS:15000}
      # Vision model for image triage (qwen-vl-plus / qwen-vl-max).
      vision-model: ${BAILIAN_VISION_MODEL:qwen-vl-plus}
  reminder:
    # Send SMS reminder N minutes before appointment start.
    enabled: ${REMINDER_ENABLED:true}
    lead-minutes: ${REMINDER_LEAD_MINUTES:30}
    template-code: ${REMINDER_TEMPLATE_CODE:APP_REMINDER}
    scan-interval-ms: ${REMINDER_SCAN_MS:60000}
    zone: ${REMINDER_ZONE:Asia/Shanghai}
  # Rate limiting (single-instance dev). For prod multi-instance, swap Caffeine for Redis Lua.
  ratelimit:
    max-keys: 50000
    idle-minutes: 30
    sms:
      per-phone-max: 5
      per-phone-window-seconds: 60
      per-ip-max: 20
      per-ip-window-seconds: 60

# OpenAPI
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

# Aliyun OpenAPI keys. Used when SMS_PROVIDER=aliyun.
# Provide via env to keep secrets out of source control.
aliyun:
  sms:
    access-key-id: ${ALIYUN_SMS_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_SMS_ACCESS_KEY_SECRET:}
    sign-name: ${ALIYUN_SMS_SIGN_NAME:东软医院}

logging:
  level:
    com.neusoft.hospital: INFO
    org.springframework.security: INFO
  pattern:
    # include traceId in every log line
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %-5level [%X{traceId:-}] %logger{36} - %msg%n"